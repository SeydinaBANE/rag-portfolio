name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledgeforge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledgeforge:${{ github.sha }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: build-and-push
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kg_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: knowledgeforge
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://kg_user:testpassword@localhost:5432/knowledgeforge
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MLFLOW_TRACKING_URI: "sqlite:///mlflow_cd.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python scripts/seed_data.py
      - run: python scripts/run_eval.py
