services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-knowledgeforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kg_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: python:3.12-slim
    command: >
      sh -c "pip install mlflow psycopg2-binary -q &&
             mlflow server
               --backend-store-uri postgresql://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-knowledgeforge}
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0 --port 5000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-knowledgeforge}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-knowledgeforge}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  mlflow_artifacts:
